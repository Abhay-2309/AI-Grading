version: '3.8'

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: '-jar DynamoDBLocal.jar -sharedDb -dbPath /data'
    ports:
      - '8000:8000'
    volumes:
      - ./docker-data/dynamodb:/data
    working_dir: /home/dynamodblocal

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: local
      MINIO_ROOT_PASSWORD: localpassword
    volumes:
      - ./docker-data/minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 local localpassword) do sleep 1; done;
      mc mb --ignore-existing local/ai-grading-returns;
      exit 0;
      "

  app:
    build:
      context: .
      target: dev
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      S3_ENDPOINT: http://minio:9000
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      S3_FORCE_PATH_STYLE: 'true'
    depends_on:
      - dynamodb-local
      - minio-init
    volumes:
      - ./src:/app/src
    command: npm run dev
